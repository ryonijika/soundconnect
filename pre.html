
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DTMF同期通信</title>
  <style>
 :root {
  /* 定数化して管理しやすく */
  --c-border: #808080;
  --c-bg-light: #f8f8f8;
  --c-text: #000000;
  --font-base: "MS Gothic", "Osaka", "Helvetica", sans-serif;
  --font-mono: "Courier New", "MS Gothic", monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-base);
  color: var(--c-text);
  max-width: 720px;
  margin: 0 auto;
  padding: 12px;
  line-height: 1.4;
}

/* 基本コンポーネント */
.card, #decodeHistory, #decoded, #info, .status-grid, .mono {
  border: 1px solid var(--c-border);
  padding: 8px;
  margin-bottom: 10px;
  background: #fff;
}

/* ラベル・見出し */
h2 { font-size: 18px; margin-bottom: 4px; }
label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 4px; }
.sub { font-size: 13px; color: #444; margin-bottom: 12px; }

/* フォーム要素 */
input, textarea, select {
  width: 100%;
  padding: 6px 8px;
  border: 1px solid #606060;
  font-size: 13px;
  outline: none;
}
input:focus, textarea:focus { border-color: #000; }
textarea { font-family: var(--font-mono); resize: vertical; min-height: 60px; }

/* ボタン */
.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
button {
  padding: 8px;
  border: 1px solid #404040;
  background: #f0f0f0;
  cursor: pointer;
}
button.green { background: #00780a; color: #fff; }
button.red { background: #600000; color: #fff; }

/* ログ・履歴エリア */
#decodeHistory { max-height: 280px; overflow-y: auto; }
.log-item { display: flex; gap: 8px; padding: 6px; border-bottom: 1px solid #ddd; font-size: 12px; }
.log-item .bits { font-family: var(--font-mono); font-weight: bold; }
.log-item .text { font-weight: bold; background: #eee; padding: 0 4px; }

/* その他 */
.mono { font-family: var(--font-mono); white-space: pre-wrap; word-break: break-all; }
.status-grid { display: flex; gap: 10px; background: var(--c-bg-light); font-size: 13px; }
.val { font-weight: bold; }

/* スクロールバー */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #a0a0a0; }
  </style>
</head>
<body>

  <h2>音波通信</h2>
  <a href="./index.html">通常verへ</a>
  <div class="card">
    <label>メッセージを受け取る</label>
    <div id="decodeHistory">
      <div style="font-size:12px; color:#444; padding:4px 10px;">
        <div class="log-item">
        </div>
      </div>
    </div>
    <div class="btn-group" style="margin-top:12px;">
      <button id="btnMic" class="green">メッセージを待機</button>
      <button id="btnENDRx" class="red" hidden>待機状態をやめる</button>
    </div>
  </div>

  <div class="card">

    <div class="row">
      <div class="col">
        <label>メッセージを送る</label>
        <input id="txtIn" type="text" placeholder="UTF-8" />
        <div hidden>
          <button id="btnEncode">エンコード</button>
          <button id="btnDecode">デコード</button>
        </div>
      </div>
      <div hidden>
        <label>バイナリ</label>
        <textarea id="bitIn" rows="2" placeholder=""></textarea>
      </div>
    </div>

    <div hidden>
      <div>
        <label>シンボルコンテンツ継続時間ms</label>
        <input id="symMs" type="number" value="50" min="10" step="1" />
      </div>
      <div>
        <label>シンボルガード継続時間ms</label>
        <input id="grdMs" type="number" value="10" min="10" step="1" />
      </div>
      <div>
        <label>同期フラグ継続時間ms</label>
        <input id="syncDurationMs" type="number" value="10" min="10" max="500" step="10" />
      </div>
      <div>
        <label>出力振幅</label>
        <input id="amp" type="number" value="0.20" min="0.05" max="1" step="0.05" />
      </div>
    </div>

    <div hidden>
      <div>
        <label>同期検出感度 (SNR倍率) </label>
        <input id="snrK" type="number" value="1" min="0.5" max="5.0" step="0.1" />
      </div>
      <div>
        <label>終了シンボルclk</label>
        <input id="ENDLen" type="number" value="5" min="3" max="20" step="1" />
      </div>
      <div>
        <label>タイムアウトclk</label>
        <input id="maxFrameClocks" type="number" value="1000" min="10" step="5" />
      </div>
    </div>


    <div hidden>
      <span>送信 <b id="sTx" style="color:#000;">何も送っていません</b></span>
      <span>受信 <b id="sRx" style="color:#000;">-</b></span>
      <span id="statePill">受信 <b id="sSync" style="color:#000;">待機していません</b></span>
    </div>
    
    <div class="btn-group" style="margin-top:12px;">
      <button id="btnSend" class="green">送信</button>
      <button id="btnENDTx" class="red" hidden>送信をやめる</button>
    </div>



    <div hidden id="statusGrid">
      <span>信号: <b id="dispSignal">-</b></span>
      <span>経過時間: <b id="dispTime">- ms</b></span>
      <span>clk: <b id="dispClock">-</b></span>
    </div>

  </div>

  <div hidden>
    <label>受信したバイナリ<span">0/1/E（同期中に表示）</span></label>
    <div id="rxLog">-</div>
  </div>
  <div hidden>
    <label>復号結果</label>
    <div id="decoded">—</div>
  </div>




  <script>
    // 周波数定義
    const BASE = 4000
    const FSYNC = [BASE+770, BASE+1633];
    const FB0 = [BASE+697, BASE+1209];
    const FB1 = [BASE+941, BASE+1336];
    const FEND = [BASE+852, BASE+1477];
    const ALL_LO = [BASE+697, BASE+770, BASE+852, BASE+941];
    const ALL_HI = [BASE+1209, BASE+1336, BASE+1477, BASE+1633];

    const $ = id => document.getElementById(id);

    // スライダー連動
    const snrInput = $("snrK");
    function sanitize(s) { return (s || "").replace(/[^01]/g, ""); }
    function textToBits(t) {
      return [...new TextEncoder().encode(t)].map(b => b.toString(2).padStart(8, "0")).join("");
    }
    function bitsToText(b) {
      const c = sanitize(b), bytes = [];
      for (let i = 0; i + 7 < c.length; i += 8) bytes.push(parseInt(c.slice(i, i + 8), 2));
      try { return new TextDecoder("utf-8", { fatal: false }).decode(new Uint8Array(bytes)); } catch { return ""; }
    }
    function bitsToHex(b) {
      const c = sanitize(b), hex = [];
      for (let i = 0; i + 7 < c.length; i += 8) hex.push(parseInt(c.slice(i, i + 8), 2).toString(16).padStart(2, '0').toUpperCase());
      return hex.join(" ");
    }
    function tryDecode(bits) {
      const usable = bits.slice(0, Math.floor(bits.length / 8) * 8);
      return usable ? bitsToText(usable) : "";
    }
    function escapeHtml(s) {
      return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function addDecodeLog(bits, hex, text, note = "") {
      const div = document.createElement("div");
      div.className = "log-item";
      const displayText = text;
      div.innerHTML = `
        <span class="text">${displayText}</span>
      `;
      const container = $("decodeHistory");
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // Goertzel
    function goertzel(buf, hz, sr) {
      const N = buf.length, k = Math.round(N * hz / sr);
      const c = 2 * Math.cos(2 * Math.PI * k / N);
      let s1 = 0, s2 = 0;
      for (let i = 0; i < N; i++) { const s = buf[i] + c * s1 - s2; s2 = s1; s1 = s; }
      return (s1 * s1 + s2 * s2 - c * s1 * s2) / N;
    }

    // シンボル分類
    function classify(buf, sr) {
      const energy = buf.reduce((s, v) => s + v * v, 0) / buf.length;
      const loP = ALL_LO.map(f => goertzel(buf, f, sr));
      const hiP = ALL_HI.map(f => goertzel(buf, f, sr));
      const loMax = Math.max(...loP), loIdx = loP.indexOf(loMax);
      const hiMax = Math.max(...hiP), hiIdx = hiP.indexOf(hiMax);
      const loF = ALL_LO[loIdx], hiF = ALL_HI[hiIdx];
      let sym = null;
      if (loF === FSYNC[0] && hiF === FSYNC[1]) sym = "SYNC";
      else if (loF === FB0[0] && hiF === FB0[1]) sym = "B0";
      else if (loF === FB1[0] && hiF === FB1[1]) sym = "B1";
      else if (loF === FEND[0] && hiF === FEND[1]) sym = "END";
      else {
        const candidates = [
          { sym: "SYNC", score: loP[ALL_LO.indexOf(FSYNC[0])] + hiP[ALL_HI.indexOf(FSYNC[1])] },
          { sym: "0", score: loP[ALL_LO.indexOf(FB0[0])] + hiP[ALL_HI.indexOf(FB0[1])] },
          { sym: "1", score: loP[ALL_LO.indexOf(FB1[0])] + hiP[ALL_HI.indexOf(FB1[1])] },
          { sym: "END", score: loP[ALL_LO.indexOf(FEND[0])] + hiP[ALL_HI.indexOf(FEND[1])] },
        ];
        candidates.sort((a, b) => b.score - a.score);
        sym = candidates[0].sym;
      }
      return { sym, loP, hiP, loF, hiF, energy };
    }

    // ★ isSync は元のアルゴリズムのまま（変更なし）
    function isSync(buf, sr) {
      const energy = buf.reduce((s, v) => s + v * v, 0) / buf.length;
      const loP = ALL_LO.map(f => goertzel(buf, f, sr));
      const hiP = ALL_HI.map(f => goertzel(buf, f, sr));
      const syncScore = loP[ALL_LO.indexOf(FSYNC[0])] + hiP[ALL_HI.indexOf(FSYNC[1])];
      const otherScores = [
        loP[ALL_LO.indexOf(FB0[0])] + hiP[ALL_HI.indexOf(FB0[1])],
        loP[ALL_LO.indexOf(FB1[0])] + hiP[ALL_HI.indexOf(FB1[1])],
        loP[ALL_LO.indexOf(FEND[0])] + hiP[ALL_HI.indexOf(FEND[1])]
      ];
      const maxOther = Math.max(...otherScores);
      const ratio = syncScore / (maxOther + 1e-12);
      const threshold = +$("snrK").value || 1;  // デフォルト 1.2
      return ratio >= threshold;
    }

    // ---- 送信関連 ----
    let txCtx = null, txOscLo = null, txOscHi = null, txGain = null, txOn = false;

    async function startSend() {

      if (!txCtx) txCtx = new AudioContext();
      if (txCtx.state !== "running") await txCtx.resume();
      ENDTx();

      const raw = $("txtIn").value || "";
      $("bitIn").value = textToBits(raw);
      let bits = sanitize($("bitIn").value);
      if (!bits) { alert("バイナリが空です"); return; }
      $("bitIn").value = bits;

      $("btnSend").hidden = true;
      $("btnENDTx").hidden = false;

      const baseSymMs = Math.max(30, +$("symMs").value || 50);
      const baseGrdMs = Math.max(10, +$("grdMs").value || 15);
      const grdMs = Math.max(baseGrdMs, baseSymMs * 0.2);
      const syncDurationMs = Math.max(50, +$("syncDurationMs").value || 200); // ← 200ms
      const ENDLen = Math.max(3, +$("ENDLen").value || 5);
      const amp = Math.min(1, Math.max(0.05, +$("amp").value || 0.20)); // ← 0.20

      const syms = [];
      const syncCount = Math.ceil(syncDurationMs / (baseSymMs + grdMs));
      for (let i = 0; i < syncCount; i++) syms.push("SYNC");
      for (const b of bits) syms.push(b === "1" ? "B1" : "B0");
      for (let i = 0; i < ENDLen; i++) syms.push("END");

      txOscLo = txCtx.createOscillator();
      txOscHi = txCtx.createOscillator();
      txGain = txCtx.createGain();
      txOscLo.type = txOscHi.type = "sine";
      txGain.gain.value = 0;
      txOscLo.connect(txGain);
      txOscHi.connect(txGain);
      txGain.connect(txCtx.destination);
      txOscLo.start();
      txOscHi.start();
      txOn = true;
      $("sTx").textContent = "メッセージを送っています";

      function scheduleSequence(t0) {
        const symSec = baseSymMs / 1000;
        const grdSec = grdMs / 1000;
        const fade = Math.max(0.002, Math.min(0.015, symSec * 0.12));
        let t = t0;
        for (const s of syms) {
          let lo, hi;
          if (s === "SYNC") { [lo, hi] = FSYNC; } else if (s === "END") { [lo, hi] = FEND; } else if (s === "B1") { [lo, hi] = FB1; } else { [lo, hi] = FB0; }
          txOscLo.frequency.setValueAtTime(lo, t);
          txOscHi.frequency.setValueAtTime(hi, t);
          txGain.gain.setValueAtTime(0, t - 0.001);
          txGain.gain.linearRampToValueAtTime(amp, t + fade);
          txGain.gain.setValueAtTime(amp, t + symSec - fade);
          txGain.gain.linearRampToValueAtTime(0, t + symSec);
          txGain.gain.setValueAtTime(0, t + symSec + 0.001);
          t += symSec + grdSec;
        }
        return t;
      }

      let nextT = txCtx.currentTime + 0.1;
      txGain.gain.cancelScheduledValues(nextT);
      txGain.gain.setValueAtTime(0, nextT);
      nextT = scheduleSequence(nextT);

      const checkCompletion = () => {
        if (txCtx.currentTime >= nextT) {
          txOn = false;
          $("sTx").textContent = "何も送っていません";
          
          $("btnSend").hidden = false;
          $("btnENDTx").hidden = true;

        } else {
          setTimeout(checkCompletion, 100);
        }
      };
      setTimeout(checkCompletion, (nextT - txCtx.currentTime) * 1000 + 50);
    }

    function ENDTx() {
      txOn = false;
      try { txOscLo?.END(); } catch {}
      try { txOscHi?.END(); } catch {}
      try { txOscLo?.disconnect(); } catch {}
      try { txOscHi?.disconnect(); } catch {}
      try { txGain?.disconnect(); } catch {}
      txOscLo = txOscHi = txGain = null;
      $("sTx").textContent = "何も送っていません";
      $("btnSend").hidden = false;
      $("btnENDTx").hidden = true;

    }

    // ---- 受信関連 ---
    let rxCtx = null, rxStream = null, rxNode = null, rxSrc = null, rxMute = null;
    let rxRing = [];
    let rxSR = 44100;
    let rxSymSamples = 0, rxGrdSamples = 0, rxSlotSamples = 0;
    let syncWindowSamples = 0;
    let rxActive = false;

    let rxPhase = "idle";
    let syncDetectedTime = 0;
    let syncStartSample = 0;
    let ENDRunCount = 0;
    let frameSampleIndex = 0;
    let rxFrameBits = "";
    let rxLog = "";
    let frameStartSample = 0;
    let rxFrameClockCount = 0;

    let lastStatusUpdate = 0;
    let currentSymbol = "-";
    let currentScore = 0;

    function rxReset() {
      rxPhase = "idle";
      syncDetectedTime = 0;
      syncStartSample = 0;
      ENDRunCount = 0;
      frameSampleIndex = 0;
      frameStartSample = 0;
      rxFrameBits = "";
      rxLog = "";
      rxFrameClockCount = 0;
      $("sSync").textContent = "待機しています...";
      $("dispSignal").textContent = "-";
      $("dispTime").textContent = "- ms";
      $("dispClock").textContent = "-";
      
      $("sRx").textContent = "受信中";
    }

    function processSymbol(sym, energy) {

      if (rxPhase === "frame") {
        rxFrameClockCount++;
      

        const maxClocks = Math.max(10, +$("maxFrameClocks").value || 10);
        if (rxFrameClockCount > maxClocks) {
          const logEl = $("rxLog");
            addDecodeLog(rxFrameBits, hex, "（タイムアウト）", `(bit=${rxFrameBits.length}, clocks=${rxFrameClockCount})`);
            $("decoded").textContent = "（タイムアウト）";
            rxPhase = "idle";
            ENDRunCount = 0;
            rxFrameBits = "";
            $("sSync").textContent = "待機しています...";
            rxLog += "\n--- タイムアウトよって完了 ---\n";
            logEl.textContent = rxLog;
            logEl.scrollTop = logEl.scrollHeight;
          return;
        }
      }

      if (sym === "SYNC") return;

      const c = sym === "END" ? "E" : sym === "B0" ? "0" : sym === "B1" ? "1" : "";
      if (!c) return;

      rxLog += c;
      if (rxLog.length > 6000) rxLog = rxLog.slice(-5000);
      const logEl = $("rxLog");
      logEl.textContent = rxLog;
      logEl.scrollTop = logEl.scrollHeight;

      if (rxPhase === "frame") {
        if (sym === "B0" || sym === "B1") {
          rxFrameBits += sym === "B1" ? "1" : "0";
          ENDRunCount = 0;
        } else if (sym === "END") {
          const ENDLen = Math.max(3, +$("ENDLen").value || 5);
          ENDRunCount++;
          if (ENDRunCount >= ENDLen) {
            const text = tryDecode(rxFrameBits);
            const hex = bitsToHex(rxFrameBits);
            if (text) {
              $("decoded").textContent = text;
            addDecodeLog(rxFrameBits, hex, text, `(bit=${rxFrameBits.length}, clocks=${rxFrameClockCount})`);
            } else {
              $("decoded").textContent = "（復号失敗）";
            addDecodeLog(rxFrameBits, hex, "（復号失敗）", `(bit=${rxFrameBits.length}, clocks=${rxFrameClockCount})`);
            }
            rxPhase = "idle";
            ENDRunCount = 0;
            rxFrameBits = "";
            $("sSync").textContent = "待機しています...";
            rxLog += "\n--- 終了シンボルによって完了 ---\n";
            logEl.textContent = rxLog;
            logEl.scrollTop = logEl.scrollHeight;
            currentSymbol = "-";
          }
        } else {
          ENDRunCount = 0;
        }
      }
    }

    function updateStatusBar() {
      if (rxPhase === "frame") {
        const elapsedSamples = frameSampleIndex - frameStartSample;
        const elapsedMs = (elapsedSamples / rxSR) * 1000;
        const clockNum = Math.floor(elapsedSamples / rxSlotSamples);
        $("dispTime").textContent = elapsedMs.toFixed(0) + " ms";
        $("dispClock").textContent = clockNum;
        $("sSync").textContent = "メッセージを通信しています";
      } else if (rxPhase === "syncing") {
        $("sSync").textContent = "待機しています...";
        const elapsed = (rxRing.length - syncDetectedTime) / rxSR * 1000;
        $("dispTime").textContent = elapsed.toFixed(0) + " ms";
      } else {
        $("sSync").textContent = "待機しています...";
      }
    }

    function onRawSamples(chunk) {
      if (!rxActive) return;
      for (const v of chunk) rxRing.push(v);

      const syncDurationMs = Math.max(50, +$("syncDurationMs").value || 200); // ← 200ms
      const syncDurationSamples = Math.round(rxSR * syncDurationMs / 1000);
      
      if (rxPhase === "idle") {
        if (rxRing.length >= syncWindowSamples) {
          const win = rxRing.slice(-syncWindowSamples);
          if (isSync(new Float32Array(win), rxSR)) {
            rxPhase = "syncing";
            syncDetectedTime = rxRing.length - syncWindowSamples;
            $("sSync").textContent = "待機しています...";
            const loP = ALL_LO.map(f => goertzel(win, f, rxSR));
            const hiP = ALL_HI.map(f => goertzel(win, f, rxSR));
            const score = loP[ALL_LO.indexOf(FSYNC[0])] + hiP[ALL_HI.indexOf(FSYNC[1])];
            currentScore = score;
          }
        }
      } else if (rxPhase === "syncing") {
        const elapsedSamples = rxRing.length - syncDetectedTime;
        if (elapsedSamples >= syncDurationSamples) {
          syncStartSample = syncDetectedTime;
          frameStartSample = syncDetectedTime;
          frameSampleIndex = syncDetectedTime + syncWindowSamples;
          rxPhase = "frame";
          rxFrameClockCount = 0;
          ENDRunCount = 0;
          rxFrameBits = "";
          rxLog = "";
          $("rxLog").textContent = "";
          $("sSync").textContent = "メッセージを通信しています";

          if (syncDetectedTime > rxSlotSamples * 10) {
            rxRing.splice(0, syncDetectedTime - rxSlotSamples);
            frameSampleIndex -= syncDetectedTime - rxSlotSamples;
            frameStartSample -= syncDetectedTime - rxSlotSamples;
            syncDetectedTime = rxSlotSamples;
          }
        } else {
          if (rxRing.length >= syncWindowSamples) {
            const win = rxRing.slice(-syncWindowSamples);
            if (!isSync(new Float32Array(win), rxSR)) { 
              rxPhase = "idle";
              $("sSync").textContent = "待機しています...";
            }
          }
        }
      } else if (rxPhase === "frame") {
        while (frameSampleIndex + rxSlotSamples <= rxRing.length) {
          const slot = rxRing.slice(frameSampleIndex, frameSampleIndex + rxSlotSamples);
          const skip = Math.floor(rxGrdSamples * 0.5);
          const win = slot.slice(skip, skip + rxSymSamples);
          if (win.length < rxSymSamples * 0.8) break;
          const res = classify(new Float32Array(win), rxSR);
          processSymbol(res.sym, res.energy);
          frameSampleIndex += rxSlotSamples;
          if (rxPhase === "idle") break;
        }
        if (rxRing.length > 100000) {
          const cut = Math.max(0, frameSampleIndex - rxSlotSamples * 10);
          if (cut > 0) {
            rxRing.splice(0, cut);
            frameSampleIndex -= cut;
            frameStartSample -= cut;
            syncDetectedTime -= cut;
          }
        }
        const now = performance.now();
        updateStatusBar();
      }
    }

    async function startRx() {
      if (!rxCtx) { rxCtx = new AudioContext(); }
      if (rxCtx.state !== "running") await rxCtx.resume();
      ENDRx();

      try {
        rxStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
            googEchoCancellation: false,
            googAutoGainControl: false,
            googNoiseSuppression: false,
            googHighpassFilter: false,
          },
          video: false
        });
      } catch (e) { alert("マイク失敗: " + e.message); return; }

      $("btnMic").hidden = true;
      $("btnENDRx").hidden = false;

      rxActive = true;
      rxSR = rxCtx.sampleRate;
      const symMs = Math.max(30, +$("symMs").value || 50);
      const grdMs = Math.max(10, +$("grdMs").value || 15);
      rxSymSamples = Math.round(rxSR * symMs / 1000);
      rxGrdSamples = Math.round(rxSR * grdMs / 1000);
      if (rxSymSamples < 32) rxSymSamples = 32;
      if (rxGrdSamples < 4) rxGrdSamples = 4;
      rxSlotSamples = rxSymSamples + rxGrdSamples;
      syncWindowSamples = Math.max(16, Math.floor(rxSymSamples / 4));

      const WL_CODE = `
class RawCollector extends AudioWorkletProcessor {
  constructor(){super();this._buf=[];}
  process(inputs){
    const ch=inputs[0]?.[0];
    if(ch){
      for(let i=0;i<ch.length;i++) this._buf.push(ch[i]);
      if(this._buf.length>=128){
        this.port.postMessage(Float32Array.from(this._buf));
        this._buf=[];
      }
    }
    return true;
  }
}
registerProcessor("raw-collector",RawCollector);
`;
      const blob = new Blob([WL_CODE], { type: "application/javascript" });
      const url = URL.createObjectURL(blob);
      await rxCtx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);

      rxNode = new AudioWorkletNode(rxCtx, "raw-collector");
      rxNode.port.onmessage = e => onRawSamples(e.data);

      rxSrc = rxCtx.createMediaStreamSource(rxStream);
      rxMute = rxCtx.createGain();
      rxMute.gain.value = 0;
      rxSrc.connect(rxNode);
      rxNode.connect(rxMute);
      rxMute.connect(rxCtx.destination);

      rxRing = [];
      rxReset();

      lastStatusUpdate = performance.now();
    }

    function ENDRx() {
      rxActive = false;
      try { rxNode?.disconnect(); } catch {}
      try { rxSrc?.disconnect(); } catch {}
      try { rxMute?.disconnect(); } catch {}
      rxStream?.getTracks().forEach(t => t.stop());
      rxNode = rxSrc = rxStream = rxMute = null;
      $("sRx").textContent = "-";
      $("sSync").textContent = "待機していません";
      $("dispSignal").textContent = "-";
      $("dispTime").textContent = "- ms";
      $("dispClock").textContent = "-";
      $("btnMic").hidden = false;
      $("btnENDRx").hidden = true;

    }

    // ---- ボタン ----
    $("btnEncode").onclick = () => {
      const raw = $("txtIn").value || "";
      $("bitIn").value = textToBits(raw);
    };
    $("btnDecode").onclick = () => {
      const bits = $("bitIn").value || "";
      $("txtIn").value = bitsToText(bits);
    };
    $("btnSend").onclick = startSend;
    $("btnMic").onclick = startRx;
    $("btnENDTx").onclick = ENDTx;
    $("btnENDRx").onclick = ENDRx;
    
    function ENDAll() {
      ENDTx();
      ENDRx();
    };

    window.addEventListener("beforeunload", ENDAll);
  </script>
</body>
</html>
