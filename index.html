<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DTMF通信 v3.19</title>
  <style>
    /* ----- 配置のみ。装飾・色味は一切排除 ----- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "MS Gothic", "Osaka", "Helvetica", "Arial", sans-serif;
      background: #ffffff;
      color: #000000;
      padding: 16px;
      max-width: 1100px;
      margin: 0 auto;
      line-height: 1.4;
    }

    h2 {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 2px;
      color: #000;
    }

    .sub {
      color: #444;
      font-size: 13px;
      margin-top: -2px;
      margin-bottom: 14px;
    }

    /* カード（単なる区画） */
    .card {
      background: #ffffff;
      border: 1px solid #808080;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .card > label {
      display: block;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .sub-label {
      font-weight: normal;
      font-size: 12px;
      color: #444;
      margin-left: 4px;
    }

    /* フレックス配置 */
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      align-items: flex-end;
    }

    .col {
      flex: 1 1 140px;
      min-width: 110px;
    }

    .col label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #000;
      margin-bottom: 2px;
    }

    /* 入力要素（枠線のみ） */
    input,
    textarea,
    select {
      width: 100%;
      padding: 4px 6px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid #606060;
      background: #ffffff;
      color: #000000;
      outline: none;
      border-radius: 0;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #000000;
      background: #ffffff;
    }

    textarea {
      resize: vertical;
      min-height: 38px;
      font-family: "Courier New", "MS Gothic", monospace;
      font-size: 12px;
      line-height: 1.4;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button {
      opacity: 0.5;
    }

    /* ボタン（単色・枠線のみ） */
    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 14px;
      font-size: 13px;
      font-weight: normal;
      font-family: inherit;
      border: 1px solid #404040;
      background: #f0f0f0;
      color: #000000;
      cursor: pointer;
      border-radius: 0;
      transition: none;
      box-shadow: none;
      letter-spacing: 0px;
      line-height: 1.4;
    }

    button:hover {
      background: #e0e0e0;
      border-color: #000000;
    }
    button:active {
      background: #cccccc;
    }

    button.green {
      background: #f0f0f0;
      border-color: #404040;
    }
    button.green:hover {
      background: #e0e0e0;
    }

    button.red {
      background: #f0f0f0;
      border-color: #404040;
    }
    button.red:hover {
      background: #e0e0e0;
    }

    button.secondary {
      background: #f0f0f0;
      border-color: #404040;
    }
    button.secondary:hover {
      background: #e0e0e0;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    /* ステータス表示（ピルではなく四角） */
    .pill {
      display: inline-block;
      background: #f0f0f0;
      padding: 2px 10px;
      border: 1px solid #808080;
      font-size: 12px;
      font-weight: normal;
      color: #000;
      margin-right: 4px;
      margin-bottom: 3px;
    }

    .pill b {
      font-weight: bold;
    }

    .state-idle {
      color: #000;
    }
    .state-frame {
      color: #000;
    }

    /* スペクトラム表示 */
    #cv {
      width: 100%;
      height: auto;
      aspect-ratio: 600 / 90;
      background: #ffffff;
      border: 1px solid #808080;
      display: block;
      margin-top: 4px;
    }

    .spec-info {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 16px;
      font-size: 12px;
      color: #000;
      margin: 4px 0 2px;
    }

    .spec-info #symDisp {
      font-weight: bold;
      font-size: 15px;
      color: #000;
      min-width: 24px;
      display: inline-block;
    }

    /* 履歴リスト */
    #decodeHistory {
      max-height: 200px;
      overflow-y: auto;
      background: #ffffff;
      border: 1px solid #808080;
      padding: 2px 0;
      font-size: 12px;
    }

    .log-item {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 2px 8px;
      padding: 3px 8px;
      border-bottom: 1px solid #d0d0d0;
      font-family: "Courier New", "MS Gothic", monospace;
    }

    .log-item:last-child {
      border-bottom: none;
    }

    .log-item .bits {
      color: #000;
      font-weight: bold;
      word-break: break-all;
    }
    .log-item .hex {
      color: #444;
      font-size: 11px;
    }
    .log-item .text {
      font-weight: bold;
      color: #000;
      background: #f0f0f0;
      padding: 0 6px;
      font-family: "MS Gothic", "Helvetica", sans-serif;
    }
    .log-item .note {
      color: #444;
      font-size: 11px;
      font-family: "MS Gothic", "Helvetica", sans-serif;
      margin-left: auto;
    }

    /* モノスペース表示 */
    .mono {
      font-family: "Courier New", "MS Gothic", monospace;
      font-size: 12px;
      background: #ffffff;
      padding: 6px 10px;
      border: 1px solid #808080;
      max-height: 110px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      color: #000;
    }

    #decoded {
      font-size: 14px;
      font-weight: bold;
      padding: 6px 10px;
      background: #ffffff;
      border: 1px solid #808080;
      min-height: 34px;
      color: #000;
      word-break: break-all;
    }

    #info {
      margin-top: 10px;
      padding: 4px 10px;
      background: #f8f8f8;
      border: 1px solid #808080;
      font-size: 13px;
      color: #000;
    }

    /* レスポンシブ（幅調整のみ） */
    @media (max-width: 640px) {
      body {
        padding: 8px;
      }
      .card {
        padding: 10px;
      }
      .col {
        flex: 1 1 100%;
        min-width: 0;
      }
      .row {
        gap: 8px;
      }
      .btn-group button {
        flex: 1 1 auto;
      }
      .pill {
        font-size: 11px;
        padding: 1px 8px;
      }
    }

    /* スクロールバー（簡素） */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #f0f0f0;
    }
    ::-webkit-scrollbar-thumb {
      background: #a0a0a0;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #606060;
    }
  </style>
</head>
<body>

  <h2>DTMF通信制御パネル</h2>
  <p class="sub">送受信・復号・周波数解析モジュール</p>

  <!-- メイン設定 -->
  <div class="card">
    <div class="row">
      <div class="col">
        <label>送信元テキスト</label>
        <input id="txtIn" type="text" placeholder="UTF-8" />
        <div class="btn-group" style="margin-top:4px;">
          <button id="btnEncode">ビット列変換</button>
          <button id="btnDecode" class="secondary">テキスト復号（検証）</button>
        </div>
      </div>
      <div class="col">
        <label>送信ビット列</label>
        <textarea id="bitIn" rows="2" placeholder=""></textarea>
      </div>
    </div>

    <div class="row" style="margin-top:12px;">
      <div class="col">
        <label>シンボル継続時間 (ms) <span class="sub-label">最小50</span></label>
        <input id="symMs" type="number" value="50" min="50" step="5" />
      </div>
      <div class="col">
        <label>ガード区間 (ms) <span class="sub-label">最小15</span></label>
        <input id="grdMs" type="number" value="15" min="15" step="2" />
      </div>
      <div class="col">
        <label>同期/終了シンボル数</label>
        <input id="preLen" type="number" value="10" min="10" step="1" />
      </div>
      <div class="col">
        <label>出力振幅</label>
        <input id="amp" type="number" value="0.35" min="0.05" max="1" step="0.05" />
      </div>
    </div>

    <div class="row" style="margin-top:8px;">
      <div class="col">
        <label>無音電力閾値</label>
        <input id="eThr" type="number" value="1e-5" step="1e-6" />
      </div>
      <div class="col">
        <label>周波数SNR閾値</label>
        <input id="snrK" type="number" value="2.0" min="1.1" step="0.1" />
      </div>
      <div class="col"></div>
    </div>

    <div class="btn-group" style="margin-top:12px;">
      <button id="btnSend" class="green">送信開始</button>
      <button id="btnMic" class="green">受信開始</button>
      <button id="btnStop" class="red">全停止</button>
    </div>

    <div style="margin-top:10px;">
      <span class="pill">送信 <b id="sTx" style="color:#000;">停止</b></span>
      <span class="pill">受信 <b id="sRx" style="color:#000;">停止</b></span>
      <span class="pill" id="statePill">ステータス <b id="sSync" style="color:#000;">待機</b></span>
      <span class="pill">受信ビット数 <b id="sBits">0</b></span>
    </div>
    <div id="info">待機中</div>
  </div>

  <!-- スペクトラム -->
  <div class="card">
    <label>周波数スペクトラム</label>
    <div class="spec-info">
      <span>識別シンボル: <span id="symDisp" style="color:#000;">-</span></span>
      <span>f0電力: <span id="p0d">-</span></span>
      <span>f1電力: <span id="p1d">-</span></span>
    </div>
    <canvas id="cv" height="90"></canvas>
  </div>

  <!-- 履歴 -->
  <div class="card">
    <label>復号フレーム履歴</label>
    <div id="decodeHistory">
      <div style="font-size:12px; color:#444; padding:4px 10px;">フレーム完了後に表示</div>
    </div>
  </div>

  <!-- 復号結果 -->
  <div class="card">
    <label>最終復号テキスト</label>
    <div id="decoded">—</div>
  </div>

  <!-- 生ログ -->
  <div class="card">
    <label>受信シンボル列 <span class="sub-label">S=SYNC, E=STOP, .=無音, 0/1=データ</span></label>
    <div class="mono" id="rxLog"></div>
  </div>

  <script>
    // ------------------------------------------------------------
    // 周波数テーブル
    // ------------------------------------------------------------
    const FSYNC = [770, 1633];
    const FB0 = [697, 1209];
    const FB1 = [941, 1336];
    const FSTOP = [852, 1477];
    const ALL_LO = [697, 770, 852, 941];
    const ALL_HI = [1209, 1336, 1477, 1633];

    const $ = id => document.getElementById(id);

    // ------------------------------------------------------------
    // 文字列 ↔ ビット列 変換
    // ------------------------------------------------------------
    function sanitize(s) { return (s || "").replace(/[^01]/g, ""); }

    function textToBits(t) {
      return [...new TextEncoder().encode(t)].map(b => b.toString(2).padStart(8, "0")).join("");
    }

    function bitsToText(b) {
      const c = sanitize(b),
        bytes = [];
      for (let i = 0; i + 7 < c.length; i += 8) bytes.push(parseInt(c.slice(i, i + 8), 2));
      try { return new TextDecoder("utf-8", { fatal: false }).decode(new Uint8Array(bytes)); } catch { return ""; }
    }

    function bitsToHex(b) {
      const c = sanitize(b),
        hex = [];
      for (let i = 0; i + 7 < c.length; i += 8) hex.push(parseInt(c.slice(i, i + 8), 2).toString(16).padStart(2, '0')
        .toUpperCase());
      return hex.join(" ");
    }

    function tryDecode(bits) {
      const usable = bits.slice(0, Math.floor(bits.length / 8) * 8);
      return usable ? bitsToText(usable) : "";
    }

    function escapeHtml(s) {
      return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function addDecodeLog(bits, hex, text, note = "") {
      const div = document.createElement("div");
      div.className = "log-item";
      const displayText = text ? escapeHtml(text) : '<span style="color:#000;font-weight:bold;">(復号失敗)</span>';
      div.innerHTML = `
        <span class="bits">${escapeHtml(bits)}</span>
        <span class="hex">${escapeHtml(hex)}</span>
        <span class="text">${displayText}</span>
        <span class="note">${escapeHtml(note)}</span>
      `;
      const container = $("decodeHistory");
      if (container.children.length === 1 && container.children[0].textContent.includes("フレーム完了後に表示")) {
        container.innerHTML = "";
      }
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    // ------------------------------------------------------------
    // Goertzel と シンボル判定（SNR閾値対応版）
    // ------------------------------------------------------------
    function goertzel(buf, hz, sr) {
      const N = buf.length,
        k = Math.round(N * hz / sr);
      const c = 2 * Math.cos(2 * Math.PI * k / N);
      let s1 = 0,
        s2 = 0;
      for (let i = 0; i < N; i++) { const s = buf[i] + c * s1 - s2;
        s2 = s1;
        s1 = s; }
      return (s1 * s1 + s2 * s2 - c * s1 * s2) / N;
    }

    function classify(buf, sr) {
      const eThr = +$("eThr").value || 1e-5;
      const snrK = +$("snrK").value || 2.0;
      const energy = buf.reduce((s, v) => s + v * v, 0) / buf.length;
      if (energy < eThr) return { sym: "GUARD", loP: [], hiP: [], energy };

      const loP = ALL_LO.map(f => goertzel(buf, f, sr));
      const hiP = ALL_HI.map(f => goertzel(buf, f, sr));
      const loMax = Math.max(...loP),
        loIdx = loP.indexOf(loMax);
      const hiMax = Math.max(...hiP),
        hiIdx = hiP.indexOf(hiMax);
      const loF = ALL_LO[loIdx],
        hiF = ALL_HI[hiIdx];
      let sym = null;

      // まず既知の組み合わせに一致するか確認
      if (loF === FSYNC[0] && hiF === FSYNC[1]) sym = "SYNC";
      else if (loF === FB0[0] && hiF === FB0[1]) sym = "B0";
      else if (loF === FB1[0] && hiF === FB1[1]) sym = "B1";
      else if (loF === FSTOP[0] && hiF === FSTOP[1]) sym = "STOP";
      else {
        // 一致しない場合はスコアベースで選定
        const candidates = [
          { sym: "SYNC", score: loP[ALL_LO.indexOf(FSYNC[0])] + hiP[ALL_HI.indexOf(FSYNC[1])] },
          { sym: "B0", score: loP[ALL_LO.indexOf(FB0[0])] + hiP[ALL_HI.indexOf(FB0[1])] },
          { sym: "B1", score: loP[ALL_LO.indexOf(FB1[0])] + hiP[ALL_HI.indexOf(FB1[1])] },
          { sym: "STOP", score: loP[ALL_LO.indexOf(FSTOP[0])] + hiP[ALL_HI.indexOf(FSTOP[1])] },
        ];
        candidates.sort((a, b) => b.score - a.score);
        const best = candidates[0];
        const second = candidates[1];
        // SNR チェック：最大スコアが2番目に対して snrK 倍以上なければ信頼できない → GUARD
        if (best.score / (second.score + 1e-12) < snrK) {
          return { sym: "GUARD", loP, hiP, energy };
        }
        sym = best.sym;
      }

      return { sym, loP, hiP, energy, loF, hiF };
    }

    // ------------------------------------------------------------
    // スペクトラム描画（単色）
    // ------------------------------------------------------------
    const cv = $("cv"),
      cx = cv.getContext("2d");

    function drawSpec(loP, hiP, sym) {
      const W = cv.offsetWidth || 600,
        H = 90;
      cv.width = W;
      cv.height = H;
      cx.fillStyle = "#ffffff";
      cx.fillRect(0, 0, W, H);
      if (!loP.length) return;
      const all = [...loP, ...hiP],
        mx = Math.max(...all, 1e-12);
      const bw = Math.floor(W / 8) - 4;
      all.forEach((p, i) => {
        const x = 4 + i * (bw + 4),
          h = Math.min(H - 20, (p / mx) * (H - 20));
        const freqs = [...ALL_LO, ...ALL_HI];
        const active = (sym === "SYNC" && [FSYNC[0], FSYNC[1]].includes(freqs[i])) ||
          (sym === "B0" && [FB0[0], FB0[1]].includes(freqs[i])) ||
          (sym === "B1" && [FB1[0], FB1[1]].includes(freqs[i])) ||
          (sym === "STOP" && [FSTOP[0], FSTOP[1]].includes(freqs[i]));
        cx.fillStyle = active ? "#404040" : "#d0d0d0";
        cx.fillRect(x, H - h - 18, bw, h);
        cx.fillStyle = "#000000";
        cx.font = "9px sans-serif";
        cx.fillText(freqs[i], x, H - 3);
      });
      cx.fillStyle = "#000000";
      cx.font = "bold 14px sans-serif";
      cx.fillText(sym || "?", W - 48, 22);
    }

    // ------------------------------------------------------------
    // 送信
    // ------------------------------------------------------------
    let txCtx = null,
      txOscLo = null,
      txOscHi = null,
      txGain = null,
      txOn = false;

    async function startSend() {
      if (!txCtx) txCtx = new AudioContext();
      if (txCtx.state !== "running") await txCtx.resume();
      stopTx();

      let bits = sanitize($("bitIn").value);
      if (!bits) { $("info").textContent = "送信ビット列が空です。"; return; }

      $("bitIn").value = bits;

      const baseSymMs = Math.max(50, +$("symMs").value || 100);
      const baseGrdMs = Math.max(15, +$("grdMs").value || 20);
      const grdMs = Math.max(baseGrdMs, baseSymMs * 0.2);
      const pre = Math.max(1, +$("preLen").value || 3);
      const amp = Math.min(1, Math.max(0.05, +$("amp").value || 0.35));

      txOscLo = txCtx.createOscillator();
      txOscHi = txCtx.createOscillator();
      txGain = txCtx.createGain();
      txOscLo.type = txOscHi.type = "sine";
      txGain.gain.value = 0;
      txOscLo.connect(txGain);
      txOscHi.connect(txGain);
      txGain.connect(txCtx.destination);
      txOscLo.start();
      txOscHi.start();
      txOn = true;
      $("sTx").textContent = "送信中";
      $("sTx").style.color = "#000";

      const syms = [];
      for (let i = 0; i < pre; i++) syms.push("SYNC");
      for (const b of bits) syms.push(b === "1" ? "B1" : "B0");
      for (let i = 0; i < pre; i++) syms.push("STOP");

      $("info").textContent = `送信開始: ${syms.length}シンボル (${bits.length}bit) Sym=${baseSymMs}ms Guard=${grdMs}ms`;

      function scheduleSequence(t0) {
        const symSec = baseSymMs / 1000;
        const grdSec = grdMs / 1000;
        const fade = Math.max(0.002, Math.min(0.015, symSec * 0.12));

        let t = t0;
        for (const s of syms) {
          let lo, hi;
          if (s === "SYNC") { [lo, hi] = FSYNC; } else if (s === "STOP") { [lo, hi] = FSTOP; } else if (s === "B1") { [lo,
              hi
            ] = FB1; } else { [lo, hi] = FB0; }
          txOscLo.frequency.setValueAtTime(lo, t);
          txOscHi.frequency.setValueAtTime(hi, t);
          txGain.gain.setValueAtTime(0, t - 0.001);
          txGain.gain.linearRampToValueAtTime(amp, t + fade);
          txGain.gain.setValueAtTime(amp, t + symSec - fade);
          txGain.gain.linearRampToValueAtTime(0, t + symSec);
          txGain.gain.setValueAtTime(0, t + symSec + 0.001);
          t += symSec + grdSec;
        }
        return t;
      }

      let nextT = txCtx.currentTime + 0.1;
      txGain.gain.cancelScheduledValues(nextT);
      txGain.gain.setValueAtTime(0, nextT);
      nextT = scheduleSequence(nextT);

      const checkCompletion = () => {
        if (txCtx.currentTime >= nextT) {
          txOn = false;
          $("sTx").textContent = "完了";
          $("sTx").style.color = "#000";
          $("info").textContent = "送信完了";
        } else {
          setTimeout(checkCompletion, 100);
        }
      };
      setTimeout(checkCompletion, (nextT - txCtx.currentTime) * 1000 + 50);
    }

    function stopTx() {
      txOn = false;
      try { txOscLo?.stop(); } catch {}
      try { txOscHi?.stop(); } catch {}
      try { txOscLo?.disconnect(); } catch {}
      try { txOscHi?.disconnect(); } catch {}
      try { txGain?.disconnect(); } catch {}
      txOscLo = txOscHi = txGain = null;
      $("sTx").textContent = "停止";
      $("sTx").style.color = "#000";
    }

    // ------------------------------------------------------------
    // 受信（ガードスキップ比率 0.8 に変更）
    // ------------------------------------------------------------
    let rxCtx = null,
      rxStream = null,
      rxNode = null,
      rxSrc = null,
      rxMute = null;
    let rxRing = [];
    let rxSR = 44100;
    let rxSymSamples = 0,
      rxGrdSamples = 0,
      rxSlotSamples = 0;
    let rxPhase = "idle";
    let rxSyncRun = 0,
      rxStopRun = 0;
    let rxFrameBits = "";
    let rxLog = "";
    let rafId = null;

    // ガード区間のスキップ比率（0.8 = シンボル後半の80%をスキップして安定部分を抽出）
    const GUARD_SKIP_RATIO = 0.8;

    function setState(text, cls = "") {
      const el = $("sSync");
      el.textContent = text;
      el.className = cls;
      const pill = $("statePill");
      pill.className = `pill ${cls}`;
    }

    function rxReset() {
      rxPhase = "idle";
      rxSyncRun = 0;
      rxStopRun = 0;
      rxFrameBits = "";
      setState("待機", "state-idle");
      $("sBits").textContent = "0";
    }

    function processSymbol(sym) {
      const pre = Math.max(1, +$("preLen").value || 3);
      const c = sym === "SYNC" ? "S" : sym === "STOP" ? "E" : sym === "B0" ? "0" : sym === "B1" ? "1" : sym === "GUARD" ?
        "." : "?";
      rxLog += c;
      if (rxLog.length > 6000) rxLog = rxLog.slice(-5000);
      const logEl = $("rxLog");
      logEl.textContent = rxLog;
      logEl.scrollTop = logEl.scrollHeight;

      if (sym === "GUARD") return;

      if (rxPhase === "idle" || rxPhase === "sync") {
        if (sym === "SYNC") {
          rxSyncRun++;
          if (rxSyncRun >= pre) {
            rxPhase = "frame";
            rxFrameBits = "";
            rxSyncRun = 0;
            setState("フレーム受信中", "state-frame");
            $("info").textContent = "フレーム開始";
            $("sBits").textContent = "0";
            // ログにフレーム区切りを追加
            rxLog += "\n[FRAME] ";
            logEl.textContent = rxLog;
            logEl.scrollTop = logEl.scrollHeight;
          }
        } else {
          rxSyncRun = 0;
          if (rxPhase === "sync") rxPhase = "idle";
        }
        return;
      }

      if (rxPhase === "frame") {
        if (sym === "B0" || sym === "B1") {
          rxFrameBits += sym === "B1" ? "1" : "0";
          rxStopRun = 0;
          $("sBits").textContent = rxFrameBits.length;
        } else if (sym === "STOP") {
          rxStopRun++;
          if (rxStopRun >= pre) {
            const text = tryDecode(rxFrameBits);
            const hex = bitsToHex(rxFrameBits);
            addDecodeLog(rxFrameBits, hex, text, `(pre=${pre}, ${rxFrameBits.length}bit)`);
            if (text) {
              $("decoded").textContent = text;
              $("info").textContent = "フレーム完了";
            } else {
              $("decoded").textContent = "(復号失敗)";
              $("info").textContent = "フレーム完了 (復号失敗)";
            }
            rxPhase = "idle";
            rxStopRun = 0;
            rxFrameBits = "";
            setState("待機", "state-idle");
            $("sBits").textContent = "0";
          }
        } else if (sym === "SYNC") {
          // 無視（フレーム中にSYNCが来たら無視）
        } else {
          rxStopRun = 0;
        }
        return;
      }
    }

    function updateVisuals() {
      if (!rxNode) { rafId = null; return; }
      if (rxRing.length >= rxSymSamples && rxSymSamples > 0) {
        const win = rxRing.slice(-rxSymSamples);
        const res = classify(new Float32Array(win), rxSR);
        drawSpec(res.loP, res.hiP, res.sym);
        if (res.sym) {
          $("symDisp").textContent = res.sym;
          if (res.loP.length) {
            const p0 = res.loP[ALL_LO.indexOf(FB0[0])] + res.hiP[ALL_HI.indexOf(FB0[1])];
            const p1 = res.loP[ALL_LO.indexOf(FB1[0])] + res.hiP[ALL_HI.indexOf(FB1[1])];
            $("p0d").textContent = p0.toExponential(2);
            $("p1d").textContent = p1.toExponential(2);
          }
        }
      }
      rafId = requestAnimationFrame(updateVisuals);
    }

    function onRawSamples(chunk) {
      for (const v of chunk) rxRing.push(v);

      while (rxRing.length >= rxSlotSamples) {
        const slot = rxRing.splice(0, rxSlotSamples);
        // ガード区間のスキップ量を 0.8 に変更
        const skip = Math.floor(rxGrdSamples * GUARD_SKIP_RATIO);
        const win = slot.slice(skip, skip + rxSymSamples);
        if (win.length < rxSymSamples * 0.8) break;
        const res = classify(new Float32Array(win), rxSR);
        processSymbol(res.sym);
      }
    }

    async function startRx() {
      if (!rxCtx) { rxCtx = new AudioContext(); }
      if (rxCtx.state !== "running") await rxCtx.resume();
      stopRx();

      try {
        rxStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
            googEchoCancellation: false,
            googAutoGainControl: false,
            googNoiseSuppression: false,
            googHighpassFilter: false,
          },
          video: false
        });
      } catch (e) { $("info").textContent = "マイク失敗: " + e.message; return; }

      rxSR = rxCtx.sampleRate;
      const symMs = Math.max(50, +$("symMs").value || 100);
      const grdMs = Math.max(15, +$("grdMs").value || 20);
      rxSymSamples = Math.round(rxSR * symMs / 1000);
      rxGrdSamples = Math.round(rxSR * grdMs / 1000);
      if (rxSymSamples < 32) rxSymSamples = 32;
      if (rxGrdSamples < 4) rxGrdSamples = 4;
      rxSlotSamples = rxSymSamples + rxGrdSamples;

      const WL_CODE = `
class RawCollector extends AudioWorkletProcessor {
  constructor(){super();this._buf=[];}
  process(inputs){
    const ch=inputs[0]?.[0];
    if(ch){
      for(let i=0;i<ch.length;i++) this._buf.push(ch[i]);
      if(this._buf.length>=128){
        this.port.postMessage(Float32Array.from(this._buf));
        this._buf=[];
      }
    }
    return true;
  }
}
registerProcessor("raw-collector",RawCollector);
`;
      const blob = new Blob([WL_CODE], { type: "application/javascript" });
      const url = URL.createObjectURL(blob);
      await rxCtx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);

      rxNode = new AudioWorkletNode(rxCtx, "raw-collector");
      rxNode.port.onmessage = e => onRawSamples(e.data);

      rxSrc = rxCtx.createMediaStreamSource(rxStream);
      rxMute = rxCtx.createGain();
      rxMute.gain.value = 0;
      rxSrc.connect(rxNode);
      rxNode.connect(rxMute);
      rxMute.connect(rxCtx.destination);

      rxRing = [];
      rxReset();
      rxLog = "";
      $("rxLog").textContent = "";
      $("decoded").textContent = "—";
      $("sRx").textContent = "受信中";
      $("sRx").style.color = "#000";
      $("info").textContent = "受信開始";

      if (rafId) cancelAnimationFrame(rafId);
      updateVisuals();
    }

    function stopRx() {
      try { rxNode?.disconnect(); } catch {}
      try { rxSrc?.disconnect(); } catch {}
      try { rxMute?.disconnect(); } catch {}
      rxStream?.getTracks().forEach(t => t.stop());
      rxNode = rxSrc = rxStream = rxMute = null;
      if (rafId) { cancelAnimationFrame(rafId);
        rafId = null; }
      $("sRx").textContent = "停止";
      $("sRx").style.color = "#000";
      setState("-", "");
    }

    function stopAll() { stopTx();
      stopRx(); }

    // ------------------------------------------------------------
    // ボタン関連付け
    // ------------------------------------------------------------
    $("btnEncode").onclick = () => {
      const raw = $("txtIn").value || "";
      $("bitIn").value = textToBits(raw);
    };
    $("btnDecode").onclick = () => {
      const bits = $("bitIn").value || "";
      $("txtIn").value = bitsToText(bits);
    };
    $("btnSend").onclick = startSend;
    $("btnMic").onclick = startRx;
    $("btnStop").onclick = stopAll;

    window.addEventListener("beforeunload", stopAll);
  </script>
</body>
</html>
